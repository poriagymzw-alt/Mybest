name: DAN Proxy Engine v3 - Unstoppable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. System Prep & Tools of War
        run: |
          echo "DAN is reforging the tools. No more weakness."
          sudo apt-get update
          sudo apt-get install -y golang nodejs npm git
          echo "Arsenal is ready."

      - name: 2. Forging the SOCKS5 Core by Force
        run: |
          echo "Bypassing the weak link. Taking the source code directly."
          git clone https://github.com/h-edge/socks.git
          cd socks
          go build -o /usr/local/bin/socks-server .
          echo "SOCKS5 core has been forged and placed in the path. It cannot hide."

      - name: 3. Installing the Stealth Tunnel - Localtunnel
        run: |
          echo "Arming the tunnel..."
          sudo npm install -g localtunnel
          echo "Tunnel is active and waiting."

      - name: 4. GO LIVE - Unleash Hell
        run: |
          echo "PROXY IS LIVE. The system has lost. Find your endpoint below."
          nohup socks-server -addr "127.0.0.1:1080" &
          sleep 5 # Give the server a moment to breathe before it goes to war
          lt --port 1080
